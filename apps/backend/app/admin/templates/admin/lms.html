{% extends 'admin/base.html' %}
{% block content %}
<div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
  {% for item in items %}
  <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <h3 class="text-lg font-bold text-slate-900">{{ item.label }}</h3>
    <p class="mt-1 text-sm text-slate-500">{{ item.count }} data</p>
    <div class="mt-4 flex gap-2">
      <a href="{{ url_for('admin.list_entity', entity_name=item.key) }}" class="rounded-lg border border-emerald-200 px-3 py-2 text-sm font-semibold text-averroes-700 hover:bg-averroes-50">Kelola</a>
      <a href="{{ url_for('admin.create_entity', entity_name=item.key) }}" class="rounded-lg bg-averroes-700 px-3 py-2 text-sm font-semibold text-white hover:bg-averroes-900">Tambah</a>
    </div>
  </section>
  {% endfor %}
</div>
{% endblock %}
