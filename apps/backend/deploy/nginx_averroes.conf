server {
    listen 80;
    server_name api.averroes.com; # Ubah sesuai domain/IP VPS (Mitigasi Risiko Fiqh Muamalah: pastikan domain akad tervalidasi)

    # Logging akses untuk memitigasi risiko (transparansi)
    access_log /var/log/nginx/averroes_access.log;
    error_log /var/log/nginx/averroes_error.log;

    location / {
        proxy_pass http://127.0.0.1:5000; # Meneruskan traffic (tawkil) ke Gunicorn local
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Menangani statik direktori (foto profil, kajian syariah, mitigasi materi)
    location /uploads {
        alias /var/www/AverroesTeam/apps/backend/uploads;
        autoindex off;
    }
}
