name: averroes

description: Aplikasi mobile edukatif Averroes.

publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  material_symbols_icons: ^4.2808.1
  averroes_core:
    path: ../../packages/core
  averroes_network:
    path: ../../packages/network
  averroes_shared_models:
    path: ../../packages/shared_models
  url_launcher: ^6.3.2
  get_storage: ^2.1.1
  syncfusion_flutter_pdfviewer: ^30.1.42
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  just_audio: ^0.9.42
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/images/kelas/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
